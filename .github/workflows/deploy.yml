name: CI/CD CRUD Kesehatan

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add EC2 to known_hosts
        run: |
          ssh-keyscan -H 13.211.175.163 >> ~/.ssh/known_hosts

      - name: Deploy ke EC2
        run: |
          ssh ubuntu@13.211.175.163 << 'EOF'
          cd /var/www/Angelina4
          git pull origin main
          sudo systemctl restart nginx
          EOF